<style>
:host { display: block; font-family: Arial, sans-serif; }
.main { padding: 2rem; }
.dashboard { display: flex; gap: 1.5rem; justify-content: center; }
.card {
  padding: 1rem 2rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.card:hover { background: #f5f5f5; }
.child-window {
  position: fixed;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 80%;
  border: 2px solid #333;
  background: white;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
}
.close-button {
  align-self: flex-end;
  background: transparent;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0.5rem;
}
</style>

<main class="main">
  <h1>Micro‑frontend Dashboard</h1>
  <div class="dashboard">
    <div class="card" (click)="openRemote('remote1')">
      Remote 1
    </div>
    <div class="card" (click)="openRemote('remote2')">
      Remote 2
    </div>
  </div>

  <div class="child-window" *ngIf="remoteComp()">
    <button class="close-button" (click)="close()">×</button>
    <ng-container *ngComponentOutlet="remoteComp()"></ng-container>
  </div>
</main>

<router-outlet />
